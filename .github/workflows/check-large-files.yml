name: Check large files

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-large-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if tracked files exceed 1 MB
        run: |
          set -euo pipefail
          max_bytes=$((1024 * 1024))
          found=0
          while IFS= read -r -d '' file; do
            size=$(stat -c%s "$file")
            if [ "$size" -gt "$max_bytes" ]; then
              echo "::error file=$file::Tracked file is ${size} bytes (limit ${max_bytes}). Add it to .gitignore or use Git LFS."
              found=1
            fi
          done < <(git ls-files -z)
          exit "$found"
